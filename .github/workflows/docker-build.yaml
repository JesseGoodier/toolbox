name: Build and Publish Images

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight
  workflow_dispatch: # Manual trigger
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "push all images if fixable CVE"
        type: choice
        options:
          - "push all images if fixable CVE"
          - "push homebrew only"
          - "push homebrew arm only"
          - "cve scan only"
          - "push all images"

env:
  REGISTRY: ghcr.io/jessegoodier

jobs:
  cve-scan:
    name: CVE Scan
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.action != 'push all images' && inputs.action != 'push homebrew only' && inputs.action != 'push homebrew arm only') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push reports
    outputs:
      cve_found: ${{ steps.check_cve.outputs.cve_found }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Determine Target Images
        id: targets
        run: |
          if [[ "${{ inputs.action }}" == "push homebrew only" || "${{ inputs.action }}" == "push homebrew arm only" ]]; then
            echo "IMAGES=toolbox-homebrew" >> $GITHUB_ENV
          else
            # Default to all published images for daily/default runs
            echo "IMAGES=toolbox-common toolbox toolbox-aws toolbox-gcp toolbox-azure toolbox-homebrew toolbox-common-debian toolbox-aws-debian" >> $GITHUB_ENV
          fi

      - name: Run Trivy vulnerability scanner on all images
        run: |
          mkdir -p trivy-results
          for IMAGE in $IMAGES; do
            echo "Scanning $REGISTRY/$IMAGE:latest..."
            trivy image --format json --output "trivy-results/$IMAGE.json" \
              --severity CRITICAL,HIGH --ignore-unfixed \
              "$REGISTRY/$IMAGE:latest" || true
          done

      - name: Check for vulnerabilities and generate report
        id: check_cve
        run: |
          bash .github/scripts/migrate_reports_to_month_dirs.sh cve-audit

          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          REPORT_DIR="cve-audit/$YEAR/$MONTH"
          REPORT_FILE="$REPORT_DIR/$MONTH-$DAY.md"
          mkdir -p "$REPORT_DIR"

          # Check if any image has vulnerabilities
          CVE_FOUND=false
          for IMAGE in $IMAGES; do
            if grep -q "Vulnerabilities" "trivy-results/$IMAGE.json" 2>/dev/null; then
              echo "High/Critical vulnerabilities found in $IMAGE."
              CVE_FOUND=true
            fi
          done

          if [ "$CVE_FOUND" = "true" ]; then
            echo "cve_found=true" >> $GITHUB_OUTPUT
          else
            echo "No fixable high/critical vulnerabilities found."
            echo "cve_found=false" >> $GITHUB_OUTPUT
          fi

          # Format report (updated script handles multiple images)
          python3 .github/scripts/format_cve_report.py trivy-results > "$REPORT_FILE"

          # Commit report
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add cve-audit
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: add CVE audit report for $(date +%Y-%m-%d)"
          git push

      - name: Upload CVE results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results/
          retention-days: 1

  build-amd64:
    needs: cve-scan
    if: ${{ !cancelled() && ( (github.event_name == 'workflow_dispatch' && (inputs.action == 'push all images' || inputs.action == 'push homebrew only')) || (needs.cve-scan.result == 'success' && needs.cve-scan.outputs.cve_found == 'true' && (github.event_name == 'schedule' || inputs.action == 'push all images if fixable CVE')) ) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Date Tag
        run: echo "DATE_TAG=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Determine Bake Target
        run: |
          if [[ "${{ inputs.action }}" == "push homebrew only" ]]; then
            echo "BAKE_TARGET=homebrew" >> $GITHUB_ENV
          else
            echo "BAKE_TARGET=default" >> $GITHUB_ENV
          fi

      - name: Build AMD64
        run: |
          ./build_images.sh --platform linux/amd64 --metadata-file bake-metadata-amd64.json --push $BAKE_TARGET
        env:
          PUSH: true
          CI: true
          TAG: latest-amd64
          DATE_TAG: ${{ env.DATE_TAG }}-amd64

      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: bake-metadata-amd64
          path: bake-metadata-amd64.json
          retention-days: 1

  build-arm64:
    needs: cve-scan
    if: ${{ !cancelled() && ( (github.event_name == 'workflow_dispatch' && (inputs.action == 'push all images' || inputs.action == 'push homebrew only' || inputs.action == 'push homebrew arm only')) || (needs.cve-scan.result == 'success' && needs.cve-scan.outputs.cve_found == 'true' && (github.event_name == 'schedule' || inputs.action == 'push all images if fixable CVE')) ) }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Date Tag
        run: echo "DATE_TAG=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Determine Bake Target
        run: |
          if [[ "${{ inputs.action }}" == "push homebrew only" || "${{ inputs.action }}" == "push homebrew arm only" ]]; then
            echo "BAKE_TARGET=homebrew" >> $GITHUB_ENV
          else
            echo "BAKE_TARGET=default" >> $GITHUB_ENV
          fi

      - name: Build ARM64
        run: |
          ./build_images.sh --platform linux/arm64 --metadata-file bake-metadata-arm64.json --push $BAKE_TARGET
        env:
          PUSH: true
          CI: true
          TAG: latest-arm64
          DATE_TAG: ${{ env.DATE_TAG }}-arm64

      - name: Upload metadata
        uses: actions/upload-artifact@v4
        with:
          name: bake-metadata-arm64
          path: bake-metadata-arm64.json
          retention-days: 1

  merge-images:
    needs: [build-amd64, build-arm64]
    if: ${{ !cancelled() && needs.build-amd64.result == 'success' && needs.build-arm64.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download metadata
        uses: actions/download-artifact@v4
        with:
          pattern: bake-metadata-*
          merge-multiple: true

      - name: Download CVE scan results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results
          path: trivy-results/
        continue-on-error: true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Final Image List
        run: |
          if [[ "${{ inputs.action }}" == "push homebrew only" || "${{ inputs.action }}" == "push homebrew arm only" ]]; then
             echo "TARGETS=homebrew" >> $GITHUB_ENV
          else
             echo "TARGETS=common aws gcp azure combined" >> $GITHUB_ENV
          fi

      - name: Create manifest lists and push
        run: |
          # Install jq
          sudo apt-get update && sudo apt-get install -y jq

          REGISTRY="ghcr.io/jessegoodier"
          DATE_TAG=$(date +%Y-%m-%d)
          TAG="latest"

          for TARGET in $TARGETS; do
            IMAGE_NAME="toolbox"
            if [ "$TARGET" != "combined" ]; then
              IMAGE_NAME="toolbox-$TARGET"
            fi
            
            echo "Processing $IMAGE_NAME..."
            
            AMD64_DIGEST=""
            ARM64_DIGEST=""
            
            if [ -f "bake-metadata-amd64.json" ]; then
                AMD64_DIGEST=$(jq -r ".\"$TARGET\".\"containerimage.digest\"" bake-metadata-amd64.json)
            fi
            
            if [ -f "bake-metadata-arm64.json" ]; then
                ARM64_DIGEST=$(jq -r ".\"$TARGET\".\"containerimage.digest\"" bake-metadata-arm64.json)
            fi
            
            if [ "$AMD64_DIGEST" == "null" ]; then AMD64_DIGEST=""; fi
            if [ "$ARM64_DIGEST" == "null" ]; then ARM64_DIGEST=""; fi
            
            if [ -z "$AMD64_DIGEST" ] && [ -z "$ARM64_DIGEST" ]; then
                echo "Error: Could not find any digests for $TARGET"
                continue
            fi

            TAGS="-t $REGISTRY/$IMAGE_NAME:latest -t $REGISTRY/$IMAGE_NAME:$DATE_TAG"
            if [ "$TARGET" == "combined" ]; then
                TAGS="$TAGS -t $REGISTRY/toolbox:latest -t $REGISTRY/toolbox:$DATE_TAG"
            fi
            
            REFS=""
            if [ -n "$AMD64_DIGEST" ]; then
                REFS="$REFS $REGISTRY/$IMAGE_NAME@$AMD64_DIGEST"
            fi
            if [ -n "$ARM64_DIGEST" ]; then
                REFS="$REFS $REGISTRY/$IMAGE_NAME@$ARM64_DIGEST"
            fi
            
            echo "Creating manifest list (or tagging single image) for $IMAGE_NAME with refs: $REFS"
            docker buildx imagetools create $TAGS $REFS
          done

      - name: Generate build history report
        run: |
          bash .github/scripts/migrate_reports_to_month_dirs.sh build-history

          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          DATE_TAG=$(date +%Y-%m-%d)
          REGISTRY="ghcr.io/jessegoodier"
          REPORT_DIR="build-history/$YEAR/$MONTH"
          REPORT="$REPORT_DIR/$MONTH-$DAY.md"

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Only pull if on main branch to avoid rebase conflicts on feature branches
          if [ "$(git branch --show-current)" = "main" ]; then
            git pull --rebase origin main
          fi

          mkdir -p "$REPORT_DIR"

          echo "# Build History - $DATE_TAG" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Images built and pushed to GitHub Container Registry." >> "$REPORT"
          echo "" >> "$REPORT"
          echo "## Table of Contents" >> "$REPORT"
          # Dynamic TOC based on targets
          for TARGET in $TARGETS; do
              IMAGE_NAME="toolbox"
              if [ "$TARGET" != "combined" ]; then
                IMAGE_NAME="toolbox-$TARGET"
              fi
              echo "- [$IMAGE_NAME](#$IMAGE_NAME)" >> "$REPORT"
          done
          echo "" >> "$REPORT"

          for TARGET in $TARGETS; do
            IMAGE="toolbox"
            if [ "$TARGET" != "combined" ]; then
              IMAGE="toolbox-$TARGET"
            fi
            DIGEST=$(docker buildx imagetools inspect $REGISTRY/$IMAGE:latest 2>/dev/null | grep -m1 "^Digest:" | awk '{print $2}')

            # Get architecture-specific details
            MANIFEST_INDEX=$(docker buildx imagetools inspect $REGISTRY/$IMAGE:latest --raw 2>/dev/null)
            AMD64_DIGEST=$(echo "$MANIFEST_INDEX" | jq -r '.manifests[] | select(.platform.architecture == "amd64" and .platform.os == "linux") | .digest')
            ARM64_DIGEST=$(echo "$MANIFEST_INDEX" | jq -r '.manifests[] | select(.platform.architecture == "arm64" and .platform.os == "linux") | .digest')

            # Get layer info for each architecture
            AMD64_MANIFEST=$(docker buildx imagetools inspect "$REGISTRY/$IMAGE@$AMD64_DIGEST" --raw 2>/dev/null)
            ARM64_MANIFEST=$(docker buildx imagetools inspect "$REGISTRY/$IMAGE@$ARM64_DIGEST" --raw 2>/dev/null)

            AMD64_LAYERS=$(echo "$AMD64_MANIFEST" | jq '.layers | length')
            ARM64_LAYERS=$(echo "$ARM64_MANIFEST" | jq '.layers | length')
            AMD64_SIZE=$(echo "$AMD64_MANIFEST" | jq '[.layers[].size] | add')
            ARM64_SIZE=$(echo "$ARM64_MANIFEST" | jq '[.layers[].size] | add')

            # Convert to human readable MB
            AMD64_SIZE_MB=$(echo "scale=1; $AMD64_SIZE / 1048576" | bc)
            ARM64_SIZE_MB=$(echo "scale=1; $ARM64_SIZE / 1048576" | bc)

            echo "## $IMAGE" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "### Image Details" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "| Architecture | Layers | Compressed Size |" >> "$REPORT"
            echo "|--------------|--------|-----------------|" >> "$REPORT"
            echo "| linux/amd64 | $AMD64_LAYERS | ${AMD64_SIZE_MB} MB |" >> "$REPORT"
            echo "| linux/arm64 | $ARM64_LAYERS | ${ARM64_SIZE_MB} MB |" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "### Latest" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "$REGISTRY/$IMAGE:latest" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "" >> "$REPORT"
            echo "### Date Tagged" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "$REGISTRY/$IMAGE:$DATE_TAG" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "" >> "$REPORT"
            echo "### SHA Pinned" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "$REGISTRY/$IMAGE@$DIGEST" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "" >> "$REPORT"

            # Check for vulnerabilities from the previous job (artifacts need to be passed if we want this)
            # For now, we omit the detailed CVE report in build history or we need to download it.
            # The cve-scan job happened before. We can download its artifact.
          done

          # Download CVE results for reporting
          mkdir -p trivy-results
          # We need to download the artifact from the cve-scan job.
          # We can't easily do 'uses: actions/download-artifact' for a job that isn't a direct parent?
          # Actually 'cve-scan' is an ancestor.

          # But for simplicity, we might skip the CVE section in build-history for this iteration
          # OR we add a step to download it.

          git add build-history
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: add build history for $DATE_TAG"
          git push
